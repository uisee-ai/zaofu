# 批D:小任务轻拓扑示例——单 lane goal 环 + 候选级 verify + judge。
# scan/plan fanout 整段跳过,task_map 由 kernel 入口合成(单任务)。
# 适用:塞得进单上下文的 PRD(个位数文件/单包);错判时把 topology
# 改回 fanout 即免费升级全拓扑。
apiVersion: zaofu.dev/v1
kind: PrdFlow
metadata:
  name: prd-light/v3
spec:
  topology: light
  lanes: 1
  backend: codex
  prdRef: docs/prd/TODO.md
  targetRoot: app
  qualityFloor: product-demo
  evidencePolicy: strict_refs
  deliveryPolicy: ship_candidate
  # 149 pilot: Thin Judge uses Kernel-bound semantic result submission.
  # Verify and Impl remain on the legacy adapter until their parity proof lands.
  semanticSubmitProfiles:
    thin-judge-goal-closure: blocking
---
apiVersion: zaofu.dev/v1
kind: ZfConfig
metadata:
  name: prd-light-v3
  zaofu:
    catalog:
      id: prd-light-v3-codex
      label: PRD Light v3
      description: Single-lane light PRD flow for small deliverables (no scan/plan fanout).
      intent: build
      backend: codex
      roles: 4
      recommended_for: [build]
      order: 32
spec:
  profile_sources: [common/profiles.yaml]
  uses: [prod-runtime/v1]
  version: "1.0"
  project:
    name: prd-light-v3
  orchestrator:
    backend: codex
    wake_min_interval_s: 5
  roles:
    - name: orchestrator
      instance_id: orchestrator
      role_kind: reader
      backend: codex
      permission_mode: bypass
      transport: tmux
      stuck_threshold_seconds: 900
      spawn_ready_timeout_seconds: 240
      triggers: [dispatch.silent_stall, orchestrator.rework.triage.requested]
      publishes: [orchestrator.rework.triage.recorded]
      skills: [zf-yoke-orchestrator-role-context, zf-harness-state-sync]
  goal:
    # light 入口合成 task_map 时同点补发 run.goal.started；admitted Thin
    # Judge result 经 Completion Gate 与 delivery operation 产生唯一终态。
    enabled: true
  runtime:
    # Legacy active-run compatibility only. New runs use deliveryPolicy.
    git:
      auto_ship_on_judge_passed: true
  # 单 lane light 流同样受候选树质量门保护(fanout_writer_scoped 段
  # 无 gates 时 validate 会 WARN)。用项目真实命令替换 TODO 后取消注释;
  # light 的 verify 是 LLM 角色,机械门是它的对照组——两者缺一不可
  # (141 §19.5:轻拓扑 + 零机械门 = 比无分级更糟)。
  # quality_gates:
  #   static:
  #     required_checks:
  #       - "TODO: typecheck 命令(如 cd app && npx tsc --noEmit / mypy src)"
  #       - "TODO: 单测命令(如 cd app && python -m pytest -q)"
  #     on_fail: "candidate tree failed static gate — 修复后重触发集成"
  workflow:
    # 分级声明(doc133 tier;141 §19.5):intake/submit 链路的
    # workflow_tier 缺省值。micro/light/standard/full 之外的值
    # 会被 schema fail-closed 拒绝。
    kind_routes:
      prd:
        default_tier: light
    dag:
      external_triggers: [prd.requested, task_map.ready]
