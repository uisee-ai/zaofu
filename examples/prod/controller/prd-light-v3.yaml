# 批D:小任务轻拓扑示例——单 lane goal 环 + 候选级 verify + judge。
# scan/plan fanout 整段跳过,task_map 由 kernel 入口合成(单任务)。
# 适用:塞得进单上下文的 PRD(个位数文件/单包);错判时把 topology
# 改回 fanout 即免费升级全拓扑。
apiVersion: zaofu.dev/v1
kind: PrdFlow
metadata:
  name: prd-light/v3
spec:
  topology: light
  lanes: 1
  backend: codex
  prdRef: docs/prd/TODO.md
  targetRoot: app
  qualityFloor: product-demo
  evidencePolicy: strict_refs
  deliveryPolicy: report_and_demo
---
apiVersion: zaofu.dev/v1
kind: ZfConfig
metadata:
  name: prd-light-v3
  zaofu:
    catalog:
      id: prd-light-v3-codex
      label: PRD Light v3
      description: Single-lane light PRD flow for small deliverables (no scan/plan fanout).
      intent: build
      backend: codex
      roles: 3
      recommended_for: [build]
      order: 32
spec:
  profile_sources: [common/profiles.yaml]
  uses: [prod-runtime/v1]
  version: "1.0"
  project:
    name: prd-light-v3
  goal:
    # goal.enabled 下 light 入口合成 task_map 时同点补发 run.goal.started
    # (run_id=run-light-<pdd>-<trigger id>),judge.passed 后 kernel 自动
    # run.goal.completed——goal 生命周期全程免手工(2026-07-08)。
    enabled: true
  runtime:
    # light 拓扑目标是全程一键到 ship:judge.passed(终局门)后 kernel 自动把
    # candidate 合入 ship_target_branch,操作员不再手工 `git merge candidate/*`。
    # ship_target_branch 默认 main;master 基线仓请 override 为 master。
    git:
      auto_ship_on_judge_passed: true
  workflow:
    dag:
      external_triggers: [prd.requested, task_map.ready]
