apiVersion: zaofu.dev/v1
kind: IssueFlow
metadata:
  name: issue-fanout/v3-claude
spec:
  lanes: 1
  backend: claude-code
  issueRef: docs/issues/TODO.md
  qualityFloor: issue-regression
  evidencePolicy: strict_refs
  deliveryPolicy: ship_candidate
---
apiVersion: zaofu.dev/v1
kind: ZfConfig
metadata:
  name: issue-fanout-v3-claude
  zaofu:
    catalog:
      id: issue-fanout-v3-claude
      label: Issue Fanout v3 (claude)
      description: Short controller issue workflow with claude lanes.
      intent: maintain
      backend: claude
      roles: 7
      recommended_for: [maintain, review, issue]
      preferred: true
      order: 30
spec:
  profile_sources: [common/profiles.yaml]
  uses: [prod-runtime/v1]
  version: "1.0"
  project:
    name: issue-fanout-v3-claude
  orchestrator:
    backend: claude-code
    wake_min_interval_s: 5
  roles:
    - name: orchestrator
      instance_id: orchestrator
      role_kind: reader
      backend: claude-code
      permission_mode: bypass
      transport: tmux
      stuck_threshold_seconds: 900
      spawn_ready_timeout_seconds: 240
      triggers: [dispatch.silent_stall, orchestrator.rework.triage.requested]
      publishes: [orchestrator.rework.triage.recorded]
      skills: [zf-yoke-orchestrator-role-context, zf-harness-state-sync]
  runtime:
    # Legacy active-run compatibility only. New runs ship through the scoped
    # Goal Completion Gate delivery operation declared by deliveryPolicy.
    git:
      auto_ship_on_judge_passed: true
    # override prod-runtime/v1 codex run_manager: claude lanes need a claude
    # resident manager (else start fails on a claude-only host).
    run_manager:
      backend: claude-code
  workflow:
    # 分级声明(doc133 tier;141 §19.5):intake/submit 链路的
    # workflow_tier 缺省值。micro/light/standard/full 之外的值
    # 会被 schema fail-closed 拒绝。
    kind_routes:
      issue:
        pattern_id: issue-triage
        default_tier: standard
    dag:
      external_triggers: [issue.requested]
    admission_replan:
      enabled: true
      resynth_trigger: issue.requested
    rework_routing:
      issue.triage.failed: issue-triage
      integration.failed: issue-triage
      static_gate.failed: fix-lane-0
      test.failed: fix-lane-0
