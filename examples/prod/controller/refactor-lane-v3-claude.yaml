apiVersion: zaofu.dev/v1
kind: RefactorFlow
metadata:
  name: refactor-lane/v3-claude
spec:
  flowProfile: refactor-flow/v3
  lanes: 2
  assembly: none
  laneRoleTemplate:
    backend: claude-code
  roleDefaults:
    backend: claude-code
    permission_mode: bypass
  objectiveRef: docs/plans/refactor-goal.md
  parityScope: [core, cli, api, web, runtime]
  gapLoop: enabled
  verifyRescan: module_parity
  completionThreshold: close_p0_p1
  deliveryPolicy: ship_candidate
---
apiVersion: zaofu.dev/v1
kind: ZfConfig
metadata:
  name: refactor-lane-v3-claude
  zaofu:
    catalog:
      id: refactor-lane-v3-claude
      label: Refactor Lane v3 (claude)
      description: Short refactor controller with per-lane verify and module parity loop.
      intent: refactor
      backend: claude
      roles: 13
      recommended_for: [refactor]
      preferred: true
      order: 33
spec:
  profile_sources: [common/profiles.yaml]
  uses: [refactor-controller-runtime/v3]
  version: "1.0"
  project:
    name: refactor-lane-v3-claude
  orchestrator:
    backend: claude-code
    wake_min_interval_s: 5
  roles:
    - name: orchestrator
      instance_id: orchestrator
      role_kind: reader
      backend: claude-code
      permission_mode: bypass
      transport: tmux
      stuck_threshold_seconds: 900
      spawn_ready_timeout_seconds: 240
      triggers: [dispatch.silent_stall, orchestrator.rework.triage.requested]
      publishes: [orchestrator.rework.triage.recorded]
      skills: [zf-yoke-orchestrator-role-context, zf-harness-state-sync]
  runtime:
    # Legacy active-run compatibility only. New runs ship through the scoped
    # Goal Completion Gate delivery operation declared by deliveryPolicy.
    git:
      auto_ship_on_judge_passed: true
    # override refactor-controller-runtime/v3 codex run_manager: claude lanes
    # need a claude resident manager (else start fails on a claude-only host).
    run_manager:
      backend: claude-code
  workflow:
    # 分级声明(doc133 tier;141 §19.5):intake/submit 链路的
    # workflow_tier 缺省值。micro/light/standard/full 之外的值
    # 会被 schema fail-closed 拒绝。
    kind_routes:
      refactor:
        default_tier: standard
    dag:
      external_triggers: [refactor.scan.requested]
    rework_routing:
      static_gate.failed: dev-lane-0
