apiVersion: zaofu.dev/v1
kind: ConfigProfile
metadata:
  name: prod-runtime/v1
spec:
  goal:
    enabled: true
  # 2026-07-08 起只用仓内两目录:skills/(zf-* 边界/合约技能,本 source)
  # + yoke/(方法论族,经 wrapper dependencies 闭包或 bundle 直名走
  # yoke overlay 解析,无需声明 source)。外部 agent-skills 基线已 1v1
  # 核实由 yoke 族与 kernel 机械化覆盖后退役。
  skill_sources:
  - {name: zaofu-skills, path: ../../../skills, mode: readonly}
  flow_defaults:
    # bundle 只声明角色 wrapper + flow/project delta。机械合同经 wrapper
    # dependencies 物化为 load-on-demand reference；Judge 保持单一 Thin Judge。
    issue:
      roleSkillBundles:
        issue-triage: [debugging-triage, source-verification, zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-issue-plan-synth, zf-yoke-planner-role-context]
        discovery: [zf-verify-rescan-replan, zf-goal-closure-replan-contract, zf-yoke-test-evaluator-role-context]
        judge-issue: [zf-goal-closure-judge-contract]
        fix: [zf-yoke-dev-worker-role-context]
        verify: [zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-yoke-test-evaluator-role-context]
    prd:
      roleSkillBundles:
        scan: [source-verification, context-hygiene, zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-prd-plan-synth, zf-yoke-planner-role-context]
        planner: [zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-prd-plan-synth, zf-yoke-planner-role-context]
        discovery: [zf-verify-rescan-replan, zf-goal-closure-replan-contract, zf-yoke-test-evaluator-role-context]
        judge-prd: [zf-goal-closure-judge-contract]
        impl: [zf-yoke-dev-worker-role-context]
        verify: [zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-yoke-test-evaluator-role-context]
  runtime:
    skills:
      # 2026-07-08:prod 预设 fail-closed——启用技能缺失/依赖断裂在
      # validate/start 前暴露,不再静默降级(需要本机可解析 skill_sources)。
      strict: true
      materialize: copy
    workdirs:
      enabled: true
      mode: worktree
    run_manager:
      backend: codex
      resident_agent:
        enabled: true
        session_mode: dedicated
    autoresearch_resident:
      enabled: true
      interval_seconds: 10
      max_actions_per_tick: 1
  # 执法档:flowProfile 展开默认 canonical-dag/v6(读者子
  # 报告证据档位);blocking 让空 evidence_refs / 空覆盖矩阵在落盘时被
  # discriminator.failed 替换并走返工,report_evidence_gate 兜住 schema
  # 之外的报告内容缺证据面。
  verification:
    event_schema:
      mode: blocking
    report_evidence_gate: fail_closed
  workflow:
    strict_triggers:
      rework_attempts_gte: 3
    work_units:
      enabled: true
      split_quality:
        mode: blocking
---
apiVersion: zaofu.dev/v1
kind: ConfigProfile
metadata:
  name: refactor-controller-runtime/v3
spec:
  goal:
    enabled: true
  # 2026-07-08 起只用仓内两目录:skills/(zf-* 边界/合约技能,本 source)
  # + yoke/(方法论族,经 wrapper dependencies 闭包或 bundle 直名走
  # yoke overlay 解析,无需声明 source)。外部 agent-skills 基线已 1v1
  # 核实由 yoke 族与 kernel 机械化覆盖后退役。
  skill_sources:
  - {name: zaofu-skills, path: ../../../skills, mode: readonly}
  flow_defaults:
    # bundle 组成同 prod-runtime/v1(2026-07-08 1v1 切换后):zf-* +
    # 角色 wrapper + flow/project delta；机械合同经 dependency closure 按需加载。
    refactor:
      roleSkillBundles:
        scan-contract: [source-verification, context-hygiene, zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-refactor-plan-synth, zf-harness-spec-freeze-contract, zf-harness-evidence-collection, zf-yoke-planner-role-context]
        scan-runtime: [source-verification, context-hygiene, zf-harness-evidence-collection]
        scan-verification: [zf-yoke-test-evaluator-role-context]
        refactor-plan-synth: [zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-refactor-plan-synth, zf-yoke-planner-role-context]
        refactor-verify-bridge: [zf-verify-rescan-replan, zf-goal-closure-replan-contract, zf-yoke-test-evaluator-role-context]
        module-parity-scan: [source-verification, zf-verify-rescan-replan, zf-goal-closure-replan-contract, zf-yoke-test-evaluator-role-context]
        judge-refactor: [zf-goal-closure-judge-contract]
        impl: [zf-yoke-dev-worker-role-context]
        verify: [zf-workflow-adaptation-boundary, zf-project-adapter-matrix-enrichment, zf-yoke-test-evaluator-role-context]
  runtime:
    skills:
      # 2026-07-08:同 prod-runtime/v1——prod 预设 fail-closed。
      strict: true
      materialize: copy
    workdirs:
      enabled: true
      mode: worktree
    run_manager:
      backend: codex
      resident_agent:
        enabled: true
        session_mode: dedicated
    autoresearch_resident:
      enabled: true
      interval_seconds: 10
      max_actions_per_tick: 1
  # 2026-07-08 LB-4 执法档(同 prod-runtime/v1)。
  verification:
    event_schema:
      mode: blocking
    report_evidence_gate: fail_closed
  workflow:
    plan_approval: false
    strict_triggers:
      rework_attempts_gte: 3
    admission_replan:
      enabled: true
      resynth_trigger: zaofu.refactor.review.ready
    work_units:
      enabled: true
      split_quality:
        mode: blocking
        max_scope_files: 12
        require_validation_surface: true
---
apiVersion: zaofu.dev/v1
kind: RoleSet
metadata:
  name: issue-codex-lanes/v1
spec:
  backend: codex
  lanes: 1
  stages:
    fix:
      role_pattern: fix-lane-{lane}
    verify:
      role_pattern: verify-lane-{lane}
---
apiVersion: zaofu.dev/v1
kind: RoleSet
metadata:
  name: prd-codex-lanes/v1
spec:
  backend: codex
  lanes: 2
  stages:
    impl:
      role_pattern: dev-lane-{lane}
    verify:
      role_pattern: verify-lane-{lane}
