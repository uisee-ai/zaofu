apiVersion: zaofu.dev/v1
kind: PrdFlow
metadata:
  name: prd-fanout/v3
spec:
  lanes: 2
  backend: codex
  prdRef: docs/prd/TODO.md
  targetRoot: app
  qualityFloor: product-demo
  evidencePolicy: strict_refs
  deliveryPolicy: ship_candidate
---
apiVersion: zaofu.dev/v1
kind: ZfConfig
metadata:
  name: prd-fanout-v3
  zaofu:
    catalog:
      id: prd-fanout-v3-codex
      label: PRD Fanout v3
      description: Short controller PRD workflow with scan, plan, impl, verify.
      intent: build
      backend: codex
      roles: 10
      recommended_for: [build]
      preferred: true
      order: 31
spec:
  profile_sources: [common/profiles.yaml]
  uses: [prod-runtime/v1]
  version: "1.0"
  project:
    name: prd-fanout-v3
  orchestrator:
    backend: codex
    wake_min_interval_s: 5
  roles:
    - name: orchestrator
      instance_id: orchestrator
      role_kind: reader
      backend: codex
      permission_mode: bypass
      transport: tmux
      stuck_threshold_seconds: 900
      spawn_ready_timeout_seconds: 240
      triggers: [dispatch.silent_stall, orchestrator.rework.triage.requested]
      publishes: [orchestrator.rework.triage.recorded]
      skills: [zf-yoke-orchestrator-role-context, zf-harness-state-sync]
  # prod-runtime/v1 使用 task_contract_required:planner 必须在每个 writer
  # task 声明 verification,candidate 集成树执行本轮命令。以下静态配置仅
  # 是 legacy/operator fallback 示例,正常 controller 无需取消注释。
  # quality_gates:
  #   static:
  #     required_checks:
  #       - "TODO: typecheck 命令(如 cd app && npx tsc --noEmit / mypy src)"
  #       - "TODO: 单测命令(如 cd app && python -m pytest -q)"
  #     on_fail: "combined candidate tree failed static gate — 修复后重触发集成"
  runtime:
    # Legacy active-run compatibility only. New runs ship through the scoped
    # Goal Completion Gate delivery operation declared by deliveryPolicy.
    git:
      auto_ship_on_judge_passed: true
  workflow:
    # 分级声明(doc133 tier;141 §19.5):intake/submit 链路的
    # workflow_tier 缺省值。micro/light/standard/full 之外的值
    # 会被 schema fail-closed 拒绝。
    kind_routes:
      prd:
        pattern_id: prd-scan
        default_tier: standard
    dag:
      external_triggers: [prd.requested]
    admission_replan:
      enabled: true
      # admission 失败时回到 plan synth，而不是重新启动整个 PRD flow。
      resynth_trigger: prd.scan.completed
    rework_routing:
      prd.scan.failed: planner
      prd.plan.failed: planner
      integration.failed: planner
      static_gate.failed: dev-lane-0
      test.failed: dev-lane-0
