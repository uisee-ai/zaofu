# safe-team preset — three-layer architecture (Layer 1 + Layer 2 + 5 workers)
#
# This is the canonical YAML for activating the three-layer orchestrator
# architecture (see docs/design/14-three-layer-architecture.md):
#
#   Layer 1: Python Orchestrator  (deterministic kernel, in src/zf/runtime/)
#   Layer 2: orchestrator role    (LLM agent, stream-json --resume)
#   Layer 3: arch / dev / verify lanes / judge (LLM workers, tmux)
#
# To activate Layer 2 in your project:
#   1. Copy this file to <project>/zf.yaml (or `zf init --preset safe-team`)
#   2. (Recommended) Fix orchestrator dispatch bugs G1/G2 first — see
#      backlogs/2026-04-14-sprint-review-orchestrator-flow-RESPONSE.md
#   3. zf start  → Layer 2 wakes on intake / exception / decision events
#
# Generated by: PYTHONPATH=src python3 -c \
#   "from zf.core.config.presets import generate_preset_yaml; \
#    print(generate_preset_yaml('safe-team', 'zaofu'), end='')"
#
# Re-generate with: zf presets show safe-team
#
# Notes on the orchestrator role (Layer 2):
#   transport: stream-json          → uses claude_code_sdk, --resume <uuid5>
#   permission_mode: allowlist      → restricts tools via --allowedTools
#   allowed_tools                   → the tool whitelist Layer 2 can call
#                                     (intentionally NO Edit, NO Bash(*))
#   triggers                        → events that wake Layer 2; events not in
#                                     this list are routed to Layer 1
#                                     housekeeping only, never the agent
#
# Notes on workers (Layer 3):
#   transport defaults to tmux (omitted in yaml)
#   critic handles arch.proposal.done design critique.
#   static_gate is the impl exit gate; review/test are verify specialist lanes.
#   judge gates on verify evidence for the terminal decision.
#
orchestrator:
  backend: claude-code
  permission_mode: bypass  # acknowledge full-access mode
preset: safe-team
project:
  name: 'zaofu'
  state_dir: .zf
quality_gates:
  static:
    enabled: true
    # required_checks 是 shell 命令字符串的列表; 每条都必须 exit 0 才算通过.
    # 留空 = 不跑外部 check (FunctionalD vacuously passes), 仅 ContractD 起作用.
    # 项目应在这里填具体命令, 例如:
    # required_checks:
    #   - "PYTHONPATH=src python3 -m pytest --no-cov -q"
    #   - "python3 -m mypy src/"
    #   - "python3 -m ruff check src/ tests/"
    required_checks: []
workflow:
  dag:
    enabled: true
    default_gate_level: permissive
    design_to_backlog_owner: orchestrator
    stage_order:
    - task.assigned
    - arch.proposal.done
    - design.critique.done
    - dev.build.done
    - static_gate.passed
    - review.approved
    - test.passed
    - judge.passed
  rework_routing:
    static_gate.failed: dev
    review.rejected: dev
    test.failed: dev
    judge.failed: dev
    gate.failed: arch
    # B10(2026-06-12): dev 失败事件缺 route 会让 zf workflow inspect STOP
    dev.blocked: orchestrator
    dev.failed: orchestrator
roles:
- allowed_tools:
  - Bash(zf feature *)
  - Bash(zf kanban *)
  - Bash(zf emit *)
  - Bash(zf events *)
  - Bash(zf status)
  - Read
  backend: claude-code
  name: orchestrator
  permission_mode: allowlist
  publishes:
  - task.dispatched
  - task.created
  - feature.created
  stages:
  - meta
  # transport: stream-json — DEPRECATED for Run 6: Anthropic limits
  # headless stream-json quota separately from interactive CLI. The
  # orchestrator runs in a tmux pane like the workers and signals
  # round completion via `zf emit orchestrator.round.complete`.
  triggers:
  - user.message
  - design.critique.done
  - clarification.needed
  - dev.blocked
  - review.rejected
  - test.failed
  - judge.failed
  - task.contract.invalid
  - dispatch.silent_stall
  - worker.stuck
- backend: claude-code
  name: arch
  role_kind: reader
  permission_mode: bypass  # acknowledge full-access mode
  publishes:
  - arch.proposal.done
  - clarification.needed
  stages:
  - design
  triggers:
  - task.assigned
- backend: claude-code
  name: critic
  role_kind: reader
  permission_mode: bypass  # acknowledge full-access mode
  publishes:
  - design.critique.done
  - gate.failed
  stages:
  - design_critique
  triggers:
  - arch.proposal.done
- backend: claude-code
  name: dev
  role_kind: writer
  permission_mode: bypass  # acknowledge full-access mode
  replicas: 2
  autoscale:
    enabled: true
    min_replicas: 2
    max_replicas: 4
    target_ready_tasks_per_worker: 1
    scale_up_pending_seconds: 120
    scale_down_idle_seconds: 900
    cooldown_seconds: 180
    drain_before_stop: true
  publishes:
  - dev.build.done
  - dev.blocked
  stages:
  - implement
  triggers:
  - task.assigned
- backend: claude-code
  name: review
  role_kind: reader
  permission_mode: bypass  # acknowledge full-access mode
  autoscale:
    enabled: true
    min_replicas: 1
    max_replicas: 2
    target_ready_tasks_per_worker: 1
    scale_up_pending_seconds: 180
    scale_down_idle_seconds: 900
    cooldown_seconds: 180
    drain_before_stop: true
  publishes:
  - review.approved
  - review.rejected
  stages:
  - code_review
  triggers:
  - static_gate.passed
- backend: claude-code
  name: test
  role_kind: reader
  permission_mode: bypass  # acknowledge full-access mode
  replicas: 2
  publishes:
  - test.passed
  - test.failed
  stages:
  - independent_test
  triggers:
  - review.approved
- backend: claude-code
  name: judge
  role_kind: reader
  permission_mode: bypass  # acknowledge full-access mode
  publishes:
  - judge.passed
  - judge.failed
  stages:
  - judge
  triggers:
  - test.passed
session:
  tmux_session: zf
stage_labels:
  code_review: "verify lane: code review"
  design: PRD / design
  design_critique: design critique
  implement: implementation
  independent_test: "verify lane: independent test"
  intake: intake & breakdown
  judge: "terminal judge"
version: '1.0'
